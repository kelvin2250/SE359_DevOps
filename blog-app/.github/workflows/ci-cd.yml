name: DevSecOps CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      deploy_to_kubernetes:
        description: "Run the Kubernetes deploy placeholder after images are published"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run unit tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./test.db
        run: pytest -v --junitxml=pytest-report.xml

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: backend/pytest-report.xml

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Scan repository
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-fs-report.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload filesystem scan report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-filesystem-report
          path: trivy-fs-report.txt

  sonarcloud:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    needs: test
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

    steps:
      - name: Checkout source
        if: env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORGANIZATION != ''
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarCloud scan
        if: env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORGANIZATION != ''
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.sources=backend,frontend
            -Dsonar.tests=backend
            -Dsonar.python.version=3.11
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Skip SonarCloud scan
        if: env.SONAR_TOKEN == '' || env.SONAR_PROJECT_KEY == '' || env.SONAR_ORGANIZATION == ''
        run: echo "SonarCloud variables are not fully configured. Skipping SonarCloud analysis."

  build-and-publish:
    name: Build, scan, and publish images
    runs-on: ubuntu-latest
    needs: [test, filesystem-scan]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare image names
        shell: bash
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          REPO="${GITHUB_REPOSITORY#*/}"
          REPO="${REPO,,}"
          echo "BACKEND_IMAGE=${REGISTRY}/${OWNER}/${REPO}-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=${REGISTRY}/${OWNER}/${REPO}-frontend" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t "$BACKEND_IMAGE:ci" ./backend

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:ci
          format: table
          output: trivy-backend-image-report.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Build frontend image
        run: docker build -t "$FRONTEND_IMAGE:ci" ./frontend

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:ci
          format: table
          output: trivy-frontend-image-report.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload image scan reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-reports
          path: |
            trivy-backend-image-report.txt
            trivy-frontend-image-report.txt

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend image
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          docker tag "$BACKEND_IMAGE:ci" "$BACKEND_IMAGE:${GITHUB_SHA}"
          docker tag "$BACKEND_IMAGE:ci" "$BACKEND_IMAGE:latest"
          docker push "$BACKEND_IMAGE:${GITHUB_SHA}"
          docker push "$BACKEND_IMAGE:latest"

      - name: Push frontend image
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          docker tag "$FRONTEND_IMAGE:ci" "$FRONTEND_IMAGE:${GITHUB_SHA}"
          docker tag "$FRONTEND_IMAGE:ci" "$FRONTEND_IMAGE:latest"
          docker push "$FRONTEND_IMAGE:${GITHUB_SHA}"
          docker push "$FRONTEND_IMAGE:latest"

  deploy-placeholder:
    name: AWS/EKS deploy placeholder
    runs-on: ubuntu-latest
    needs: build-and-publish
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_to_kubernetes == 'true'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show next AWS steps
        run: |
          echo "AWS/EKS is intentionally left for you."
          echo "After you create the cluster and configure kubeconfig, deploy with:"
          echo "kubectl apply -f k8s/"
