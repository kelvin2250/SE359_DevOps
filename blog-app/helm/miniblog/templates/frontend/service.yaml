apiVersion: v1
kind: Service
metadata:
  name: {{ include "miniblog.frontend.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "miniblog.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.serviceType }}
  selector:
    {{- include "miniblog.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  ports:
    - port: {{ .Values.frontend.servicePort }}
      targetPort: {{ .Values.frontend.containerPort }}
      {{- if eq .Values.frontend.serviceType "NodePort" }}
      nodePort: {{ .Values.frontend.nodePort }}
      {{- end }}
      protocol: TCP
      name: http
