# ============================================
# MiniBlog - Production Environment
# ============================================
# Dùng cho: helm install miniblog . -f values-prod.yaml
# ============================================

global:
  environment: production

backend:
  replicas: 5
  image:
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

frontend:
  replicas: 5
  image:
    tag: latest
    pullPolicy: Always
  serviceType: ClusterIP
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

postgresql:
  storage:
    size: 20Gi
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

ingress:
  enabled: true
  hosts:
    - host: blog.example.com
      paths:
        - path: /
          pathType: Prefix
          serviceName: frontend
          servicePort: 80
  tls:
    - secretName: blog-app-tls
      hosts:
        - blog.example.com
