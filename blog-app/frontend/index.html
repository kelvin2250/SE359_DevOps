<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notion — Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f8f6;
      --surface: #ffffff;
      --border: #e8e5e0;
      --text: #1a1916;
      --muted: #8c8880;
      --accent: #1a1916;
      --tag-bg: #f0ede8;
      --danger: #c0392b;
      --radius: 4px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Lora', serif;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .logo span { color: var(--muted); font-weight: 400; font-style: italic; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
      font-family: inherit;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover { opacity: 0.85; }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }
    .btn-ghost:hover { background: var(--tag-bg); color: var(--text); }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border-color: transparent;
      padding: 4px 8px;
      font-size: 0.8rem;
    }
    .btn-danger:hover { background: #fdf0ef; }

    /* ── Layout ── */
    main { max-width: 780px; margin: 0 auto; padding: 3rem 2rem; }

    /* ── Views ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── List view ── */
    .list-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 2.5rem;
    }

    .list-title {
      font-family: 'Lora', serif;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .post-count {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* Post cards */
    #posts-container { display: flex; flex-direction: column; gap: 0; }

    .post-card {
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: opacity 0.15s;
      animation: fadeUp 0.3s ease both;
    }

    .post-card:first-child { border-top: 1px solid var(--border); }
    .post-card:hover { opacity: 0.65; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.5rem;
    }

    .tag {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--tag-bg);
      color: var(--muted);
      padding: 2px 8px;
      border-radius: 2px;
    }

    .date {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .card-title {
      font-family: 'Lora', serif;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
      line-height: 1.4;
    }

    .card-excerpt {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 5rem 0;
      color: var(--muted);
    }

    .empty-state .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      opacity: 0.4;
    }

    .empty-state p { font-size: 0.95rem; margin-bottom: 1.5rem; }

    /* ── Detail view ── */
    .detail-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
    }
    .back-btn:hover { color: var(--text); }

    .detail-actions { display: flex; gap: 8px; }

    .detail-tag {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .detail-title {
      font-family: 'Lora', serif;
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.25;
      margin-bottom: 1rem;
    }

    .detail-date {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .detail-content {
      font-size: 1.05rem;
      line-height: 1.8;
      color: #2d2c2a;
      white-space: pre-wrap;
      font-family: 'Lora', serif;
    }

    /* ── Form view ── */
    .form-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
    }

    .form-heading {
      font-family: 'Lora', serif;
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .form-group { margin-bottom: 1.5rem; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input[type="text"], textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      resize: none;
    }

    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
    }

    textarea { min-height: 300px; line-height: 1.7; }

    .form-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--accent);
      color: #fff;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 0.85rem;
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Loading */
    .loading {
      text-align: center;
      padding: 4rem 0;
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }

    /* Responsive */
    @media (max-width: 600px) {
      main { padding: 2rem 1.25rem; }
      .detail-title { font-size: 1.7rem; }
      .list-title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">ink<span>notes</span></div>
  <button class="btn btn-primary" onclick="showForm()">+ New post</button>
</header>

<main>
  <!-- List View -->
  <div id="view-list" class="view active">
    <div class="list-header">
      <h1 class="list-title">All posts</h1>
      <span class="post-count" id="post-count"></span>
    </div>
    <div id="posts-container">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <!-- Detail View -->
  <div id="view-detail" class="view">
    <div class="detail-nav">
      <button class="back-btn" onclick="showList()">← Back</button>
      <div class="detail-actions">
        <button class="btn btn-ghost" onclick="showEditForm()">Edit</button>
        <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
    <div id="detail-tag" class="detail-tag"></div>
    <h2 id="detail-title" class="detail-title"></h2>
    <div id="detail-date" class="detail-date"></div>
    <div id="detail-content" class="detail-content"></div>
  </div>

  <!-- Form View -->
  <div id="view-form" class="view">
    <div class="form-header">
      <h2 class="form-heading" id="form-heading">New post</h2>
      <button class="back-btn" onclick="cancelForm()">✕ Cancel</button>
    </div>
    <div class="form-group">
      <label for="input-title">Title</label>
      <input type="text" id="input-title" placeholder="What's this about?" />
    </div>
    <div class="form-group">
      <label for="input-tag">Tag <span style="font-weight:300;text-transform:none;letter-spacing:0">(optional)</span></label>
      <input type="text" id="input-tag" placeholder="e.g. personal, tech, ideas" />
    </div>
    <div class="form-group">
      <label for="input-content">Content</label>
      <textarea id="input-content" placeholder="Start writing..."></textarea>
    </div>
    <div class="form-footer">
      <button class="btn btn-ghost" onclick="cancelForm()">Cancel</button>
      <button class="btn btn-primary" onclick="submitForm()">Publish</button>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  const API = '/api';
  let posts = [];
  let currentPost = null;
  let isEditing = false;

  // ── Utilities ──
  function $(id) { return document.getElementById(id); }

  function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    $('view-' + name).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showToast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('vi-VN', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function excerpt(text, len = 120) {
    return text.length > len ? text.slice(0, len) + '…' : text;
  }

  // ── API calls ──
  async function api(method, path, body) {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json' },
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    if (!res.ok) throw new Error(await res.text());
    if (res.status === 204) return null;
    return res.json();
  }

  // ── List ──
  async function loadPosts() {
    $('posts-container').innerHTML = '<div class="loading">Loading...</div>';
    try {
      posts = await api('GET', '/posts');
      renderList();
    } catch (e) {
      $('posts-container').innerHTML = '<div class="loading">Could not connect to server.</div>';
    }
  }

  function renderList() {
    const container = $('posts-container');
    $('post-count').textContent = posts.length ? `${posts.length} post${posts.length > 1 ? 's' : ''}` : '';

    if (!posts.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">✦</div>
          <p>No posts yet. Start writing something.</p>
          <button class="btn btn-primary" onclick="showForm()">+ New post</button>
        </div>`;
      return;
    }

    container.innerHTML = posts.map((p, i) => `
      <div class="post-card" style="animation-delay:${i * 40}ms" onclick="openPost(${p.id})">
        <div class="card-meta">
          ${p.tag ? `<span class="tag">${p.tag}</span>` : ''}
          <span class="date">${formatDate(p.created_at)}</span>
        </div>
        <div class="card-title">${p.title}</div>
        <div class="card-excerpt">${excerpt(p.content)}</div>
      </div>
    `).join('');
  }

  function showList() {
    showView('list');
    loadPosts();
  }

  // ── Detail ──
  function openPost(id) {
    currentPost = posts.find(p => p.id === id);
    if (!currentPost) return;
    $('detail-tag').textContent = currentPost.tag ? currentPost.tag.toUpperCase() : '';
    $('detail-title').textContent = currentPost.title;
    $('detail-date').textContent = formatDate(currentPost.created_at) +
      (currentPost.updated_at ? '  ·  Edited ' + formatDate(currentPost.updated_at) : '');
    $('detail-content').textContent = currentPost.content;
    showView('detail');
  }

  async function confirmDelete() {
    if (!currentPost) return;
    if (!confirm(`Delete "${currentPost.title}"?`)) return;
    await api('DELETE', `/posts/${currentPost.id}`);
    showToast('Post deleted');
    showList();
  }

  // ── Form ──
  function showForm() {
    isEditing = false;
    $('form-heading').textContent = 'New post';
    $('input-title').value = '';
    $('input-tag').value = '';
    $('input-content').value = '';
    showView('form');
  }

  function showEditForm() {
    if (!currentPost) return;
    isEditing = true;
    $('form-heading').textContent = 'Edit post';
    $('input-title').value = currentPost.title;
    $('input-tag').value = currentPost.tag || '';
    $('input-content').value = currentPost.content;
    showView('form');
  }

  function cancelForm() {
    if (isEditing && currentPost) {
      openPost(currentPost.id);
    } else {
      showList();
    }
  }

  async function submitForm() {
    const title = $('input-title').value.trim();
    const content = $('input-content').value.trim();
    const tag = $('input-tag').value.trim();

    if (!title) { $('input-title').focus(); return; }
    if (!content) { $('input-content').focus(); return; }

    const body = { title, content, ...(tag && { tag }) };

    try {
      if (isEditing && currentPost) {
        currentPost = await api('PUT', `/posts/${currentPost.id}`, body);
        showToast('Post updated ✓');
        openPost(currentPost.id);
      } else {
        const created = await api('POST', '/posts', body);
        showToast('Post published ✓');
        posts.unshift(created);
        openPost(created.id);
      }
    } catch (e) {
      showToast('Something went wrong');
    }
  }

  // ── Init ──
  loadPosts();
</script>
</body>
</html>
