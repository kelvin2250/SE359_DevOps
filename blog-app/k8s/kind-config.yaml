# Kind cluster configuration
# Cho phép expose port ra localhost để test
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: miniblog
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8081
        protocol: TCP
      - containerPort: 30002
        hostPort: 8082
        protocol: TCP
  - role: worker
