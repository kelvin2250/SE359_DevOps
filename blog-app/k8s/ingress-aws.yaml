# ============================================
# Ingress - AWS Load Balancer Controller (ALB)
# ============================================
# Yêu cầu:
#   1. Tạo EKS cluster
#   2. Cài AWS Load Balancer Controller:
#      https://kubernetes-sigs.github.io/aws-load-balancer-controller/
#   3. Thay đổi host thành domain thật của bạn
#   4. Cấu hình Route53 hoặc Cloudfront cho domain
# ============================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blog-app
  namespace: blog-app
  annotations:
    # --- AWS Load Balancer Controller ---
    kubernetes.io/ingress.class: alb

    # Loại ALB: internet-facing (public) hoặc internal
    alb.ingress.kubernetes.io/scheme: internet-facing

    # SSL/TLS listener (cần ACM certificate)
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}, {"HTTP":80}]'
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:region:account:certificate/xxx

    # Redirect HTTP → HTTPS
    # alb.ingress.kubernetes.io/ssl-redirect: '443'

    # Target type: ip (dùng cho Fargate) hoặc instance (dùng cho EC2)
    alb.ingress.kubernetes.io/target-type: ip

    # Health check
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-port: "8000"
    alb.ingress.kubernetes.io/success-codes: "200"

    # Group Ingress (nếu muốn gộp nhiều service)
    # alb.ingress.kubernetes.io/group.name: blog-app

    # Timeout
    alb.ingress.kubernetes.io/idle-timeout: "60"

spec:
  rules:
    - host: blog.example.com  # ← Thay bằng domain của bạn
      http:
        paths:
          # --- Frontend ---
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

          # --- Backend API ---
          # Frontend Nginx xử lý proxy /api/* → backend
          # (đã cấu hình trong frontend/nginx.conf)
