name: DevSecOps CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  APP_DIR: blog-app

jobs:
  test:
    name: Test backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: blog-app/backend/requirements.txt

      - name: Install dependencies
        working-directory: blog-app/backend
        run: pip install -r requirements.txt

      - name: Run unit tests
        working-directory: blog-app/backend
        env:
          DATABASE_URL: sqlite:///./test.db
        run: pytest -v --junitxml=pytest-report.xml

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: blog-app/backend/pytest-report.xml

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Scan repository
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: blog-app
          format: table
          output: trivy-fs-report.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload filesystem scan report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-filesystem-report
          path: trivy-fs-report.txt

  hadolint:
    name: Hadolint - Dockerfile lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Lint backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: blog-app/backend/Dockerfile
          config: blog-app/.hadolint.yaml

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: blog-app/frontend/Dockerfile
          config: blog-app/.hadolint.yaml

  checkov:
    name: Checkov - IaC security scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run Checkov on K8s manifests
        uses: bridgecrewio/checkov-action@master
        with:
          directory: blog-app/k8s
          framework: kubernetes
          output_format: cli
          soft_fail: false
          config_file: blog-app/.checkov.yml

      - name: Run Checkov on Dockerfiles
        uses: bridgecrewio/checkov-action@master
        with:
          directory: blog-app
          framework: dockerfile
          output_format: cli
          soft_fail: true

  sonarcloud:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    needs: test
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

    steps:
      - name: Checkout source
        if: env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORGANIZATION != ''
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarCloud scan
        if: env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORGANIZATION != ''
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.sources=blog-app/backend,blog-app/frontend
            -Dsonar.tests=blog-app/backend
            -Dsonar.python.version=3.11
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Skip SonarCloud scan
        if: env.SONAR_TOKEN == '' || env.SONAR_PROJECT_KEY == '' || env.SONAR_ORGANIZATION == ''
        run: echo "SonarCloud variables are not fully configured. Skipping SonarCloud analysis."

  helm-lint:
    name: Helm chart lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.1

      - name: Lint Helm chart
        run: helm lint blog-app/helm/miniblog/

      - name: Render templates (dev)
        run: |
          echo "=== Render with dev values ==="
          helm template test blog-app/helm/miniblog/ -f blog-app/helm/miniblog/values-dev.yaml > /dev/null
          echo "✅ Dev template rendered successfully"

      - name: Render templates (prod)
        run: |
          echo "=== Render with prod values ==="
          helm template test blog-app/helm/miniblog/ -f blog-app/helm/miniblog/values-prod.yaml > /dev/null
          echo "✅ Prod template rendered successfully"

  build-and-publish:
    name: Build, scan, and publish images
    runs-on: ubuntu-latest
    needs: [test, filesystem-scan, hadolint, checkov, helm-lint]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare image names
        shell: bash
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          REPO="${GITHUB_REPOSITORY#*/}"
          REPO="${REPO,,}"
          echo "BACKEND_IMAGE=${REGISTRY}/${OWNER}/${REPO}-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=${REGISTRY}/${OWNER}/${REPO}-frontend" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t "$BACKEND_IMAGE:ci" ./blog-app/backend

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:ci
          format: table
          output: trivy-backend-image-report.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Build frontend image
        run: docker build -t "$FRONTEND_IMAGE:ci" ./blog-app/frontend

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:ci
          format: table
          output: trivy-frontend-image-report.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload image scan reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-reports
          path: |
            trivy-backend-image-report.txt
            trivy-frontend-image-report.txt

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend image
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          docker tag "$BACKEND_IMAGE:ci" "$BACKEND_IMAGE:${GITHUB_SHA}"
          docker tag "$BACKEND_IMAGE:ci" "$BACKEND_IMAGE:latest"
          docker push "$BACKEND_IMAGE:${GITHUB_SHA}"
          docker push "$BACKEND_IMAGE:latest"

      - name: Push frontend image
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          docker tag "$FRONTEND_IMAGE:ci" "$FRONTEND_IMAGE:${GITHUB_SHA}"
          docker tag "$FRONTEND_IMAGE:ci" "$FRONTEND_IMAGE:latest"
          docker push "$FRONTEND_IMAGE:${GITHUB_SHA}"
          docker push "$FRONTEND_IMAGE:latest"

      - name: Update Helm values image tag and push changes
        if: github.event_name == 'push'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          REPO="${GITHUB_REPOSITORY#*/}"
          REPO="${REPO,,}"
          
          # Update repository fields and image tags using yq
          yq -i ".backend.image.repository = \"ghcr.io/${OWNER}/${REPO}-backend\"" blog-app/helm/miniblog/values.yaml
          yq -i ".backend.image.tag = \"${{ github.sha }}\"" blog-app/helm/miniblog/values.yaml
          yq -i ".frontend.image.repository = \"ghcr.io/${OWNER}/${REPO}-frontend\"" blog-app/helm/miniblog/values.yaml
          yq -i ".frontend.image.tag = \"${{ github.sha }}\"" blog-app/helm/miniblog/values.yaml
          
          if ! git diff --quiet blog-app/helm/miniblog/values.yaml; then
            git add blog-app/helm/miniblog/values.yaml
            git commit -m "[skip ci] update image tags to ${{ github.sha }}"
            git push
          else
            echo "No changes in values.yaml"
          fi
